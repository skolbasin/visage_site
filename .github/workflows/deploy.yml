name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.Server_Host }}
          username: ${{ secrets.Server_User }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/visage_site
            git pull
            docker compose down
            docker compose build --no-cache
            docker compose up -d